name: Update BidSniffer Bids

on:
  schedule:
    - cron: '17 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-bids:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Harvest opportunities
        run: npm run harvest

      - name: Generate static pages and sitemap
        run: npm run generate

      - name: Commit updated bid data and pages
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/opportunities.json public/data/opportunities.json public/bids public/sitemap.xml
            git commit -m "Update harvested bid opportunities"
            git push
          else
            echo "No BidSniffer changes to commit."
          fi
